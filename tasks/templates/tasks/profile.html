{% extends 'tasks/base.html' %}
{% block title %}Profile{% endblock %}

{% block content %}


<div class="form-card">
    <h4 class="text-center mb-4">Votre profil</h4>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
    <label class="form-label" >Avatar</label>
    {% if request.user.profile.avatar %}
        <div class="mb-2">
            <img src="{{ request.user.profile.avatar.url }}"
                 width="80" height="80"
                 style="border-radius: 50%; object-fit: cover;">
        </div>
    {% endif %}
    <input type="file" name="avatar" class="form-control" accept="image/*">
        </div>

        <div class="mb-3">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" value="{{request.user.username}}" >
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{request.user.email}}">
        </div>

        <div class="mb-3">
    <label class="form-label">Nouveau mot de passe</label>
    <input type="password" name="password" class="form-control">
    <small class="text-secondary">Laissez vide pour ne pas changer</small>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary w-100">Enregistrer les modifications</button>
        </div>

        <p class="text-center text-secondary mt-4"><a href="{% url 'dashboard' %}" class="text-info">Retour au dashboard</a>
        </p>

    </form>

</div>
{% endblock %}
