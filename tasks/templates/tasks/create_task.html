{% extends 'tasks/base.html' %}

{% block title %}Créer une tâche{% endblock %}

{% block content %}
<div class="form-card">
<h4 class="text-center mb-4">Créer une tâche</h4>
{% if error %}
    <div class="alert alert-danger">{{ error }}</div>
{% endif %}
<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
            <label class="form-label">Titre de la tâche</label>
    <input type="text" name="title" class="form-control">
    </div>

    <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control"></textarea>
    </div>

    <div class="mb-3">
            <label class="form-label">Deadline</label>
    <input type="datetime-local" name="deadline" class="form-control">

    </div>

    <div class="mb-3">
            <label class="form-label">Statut</label>
    <select name="status" id="status" class="form-select">
        <option value="todo"> À faire</option>
        <option value="in_progress">En cours</option>
        <option value="done">Terminé</option>
    </select>
    </div>

<div class="mb-3">
            <label class="form-label">Nom du projet associé</label>
<select name="project" class="form-select">
    {% for project in projects %}
        <option value="{{ project.pk }}">{{ project.name }}</option>
    {% endfor %}
</select>
</div>

<div class="mb-3">
            <label class="form-label">Utilisateur assigné</label>
<select name="assigned_to" class="form-select">
    {% for user in users %}
        <option value="{{ user.pk }}">{{ user.username }}</option>
    {% endfor %}
</select>
</div>

    <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary w-100">Créer</button>
        </div>
</form>

<p class="text-center text-secondary mt-3"><a href="{% url 'dashboard' %}" class="text-info">Retour au dashboard</a>
</p>
</div>
{% endblock %}
