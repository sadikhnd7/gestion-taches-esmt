{% extends 'tasks/base.html' %}
{% block title %}Ajouter un membre{% endblock %}

{% block content %}
<div class="form-card">
    <h4 class="text-center mb-4">Ajouter un membre à {{ project.name }}</h4>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Choisir un utilisateur</label>
            <select name="user" class="form-select">
                {% for user in users %}
                    <option value="{{ user.pk }}">{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary w-100">Ajouter</button>
        </div>
    </form>

    <p class="text-center text-secondary mt-3">
        <a href="{% url 'dashboard' %}" class="text-info">Retour au dashboard</a>
    </p>
</div>
{% endblock %}
